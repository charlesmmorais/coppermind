<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/><stop offset="1" stop-color="#0b1422"/>
    </linearGradient>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c87137"/>
    </marker>
  </defs>
  <rect width="980" height="560" rx="16" fill="url(#bgf)"/>
  <text x="34" y="44" fill="#e6edf3" font-size="24" font-weight="700">Fluxo de Autorroteamento — Freerouting</text>
  <text x="34" y="68" fill="#9fb0c8" font-size="13.5">Specctra DSN → roteamento → SES → de volta ao board (Java direto, Docker ou Podman)</text>

  <!-- step style helper via repeated rects -->
  <!-- 1 KiCAD board -->
  <rect x="34" y="100" width="180" height="64" rx="10" fill="#1a2f1f" stroke="#3f9f6b" stroke-width="1.6"/>
  <text x="124" y="128" fill="#9be7bd" font-size="13.5" font-weight="700" text-anchor="middle">KiCAD — placa</text>
  <text x="124" y="148" fill="#bfe6cf" font-size="11" text-anchor="middle">.kicad_pcb com nets</text>

  <!-- arrow -->
  <line x1="214" y1="132" x2="262" y2="132" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>
  <text x="238" y="122" fill="#9fb0c8" font-size="10" text-anchor="middle">export</text>

  <!-- 2 DSN -->
  <rect x="262" y="100" width="170" height="64" rx="10" fill="#13233a" stroke="#d4a017" stroke-width="1.6"/>
  <text x="347" y="124" fill="#f2dca0" font-size="13.5" font-weight="700" text-anchor="middle">board.dsn</text>
  <text x="347" y="143" fill="#9fb0c8" font-size="10.5" text-anchor="middle">File &gt; Export &gt;</text>
  <text x="347" y="156" fill="#9fb0c8" font-size="10.5" text-anchor="middle">Specctra DSN</text>

  <line x1="432" y1="132" x2="480" y2="132" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 3 route_autoroute -->
  <rect x="480" y="98" width="200" height="68" rx="10" fill="#13233a" stroke="#c87137" stroke-width="1.8"/>
  <text x="580" y="124" fill="#f0c79a" font-size="13.5" font-weight="700" text-anchor="middle">route_autoroute</text>
  <text x="580" y="143" fill="#9fb0c8" font-size="10.5" text-anchor="middle">tool MCP do Coppermind</text>
  <text x="580" y="157" fill="#9fb0c8" font-size="10.5" text-anchor="middle">autoroute_dsn()</text>

  <line x1="580" y1="166" x2="580" y2="206" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- runtime decision -->
  <polygon points="580,210 700,260 580,310 460,260" fill="#15263d" stroke="#2dd4bf" stroke-width="1.6"/>
  <text x="580" y="252" fill="#7bf0dd" font-size="12.5" font-weight="700" text-anchor="middle">runtime?</text>
  <text x="580" y="270" fill="#9fb0c8" font-size="10" text-anchor="middle">resolve_runtime()</text>

  <!-- runtime options -->
  <rect x="720" y="196" width="150" height="38" rx="8" fill="#152a22" stroke="#3f9f6b"/>
  <text x="795" y="220" fill="#9be7bd" font-size="12" font-weight="600" text-anchor="middle">Java 21+ (direto)</text>
  <rect x="720" y="241" width="150" height="38" rx="8" fill="#152a22" stroke="#3f9f6b"/>
  <text x="795" y="265" fill="#9be7bd" font-size="12" font-weight="600" text-anchor="middle">Docker</text>
  <rect x="720" y="286" width="150" height="38" rx="8" fill="#152a22" stroke="#3f9f6b"/>
  <text x="795" y="310" fill="#9be7bd" font-size="12" font-weight="600" text-anchor="middle">Podman</text>
  <line x1="700" y1="250" x2="720" y2="215" stroke="#2dd4bf" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="700" y1="260" x2="720" y2="260" stroke="#2dd4bf" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="700" y1="270" x2="720" y2="305" stroke="#2dd4bf" stroke-width="1.6" marker-end="url(#a2)"/>
  <text x="795" y="345" fill="#9fb0c8" font-size="10.5" text-anchor="middle">freerouting.jar  -de .dsn  -do .ses  -mp N</text>

  <!-- down to ses -->
  <line x1="580" y1="310" x2="580" y2="356" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 4 SES -->
  <rect x="480" y="358" width="200" height="60" rx="10" fill="#13233a" stroke="#d4a017" stroke-width="1.6"/>
  <text x="580" y="382" fill="#f2dca0" font-size="13.5" font-weight="700" text-anchor="middle">board.ses</text>
  <text x="580" y="401" fill="#9fb0c8" font-size="10.5" text-anchor="middle">sessão roteada (Specctra)</text>

  <line x1="480" y1="388" x2="432" y2="388" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 5 SES parser -->
  <rect x="232" y="356" width="200" height="64" rx="10" fill="#0e1d31" stroke="#2dd4bf" stroke-width="1.6"/>
  <text x="332" y="380" fill="#7bf0dd" font-size="13" font-weight="700" text-anchor="middle">parse_ses() — puro</text>
  <text x="332" y="398" fill="#9fb0c8" font-size="10.5" text-anchor="middle">S-expr · resolução/unidades</text>
  <text x="332" y="412" fill="#9fb0c8" font-size="10.5" text-anchor="middle">wires → Tracks · Vias</text>

  <line x1="332" y1="420" x2="332" y2="456" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 6 apply -->
  <rect x="232" y="458" width="200" height="60" rx="10" fill="#13233a" stroke="#c87137" stroke-width="1.6"/>
  <text x="332" y="482" fill="#f0c79a" font-size="12.5" font-weight="700" text-anchor="middle">apply_route_to_board()</text>
  <text x="332" y="501" fill="#9fb0c8" font-size="10.5" text-anchor="middle">substitui roteamento obsoleto</text>

  <line x1="432" y1="488" x2="486" y2="488" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 7 commit gate -->
  <rect x="486" y="456" width="200" height="64" rx="10" fill="#13233a" stroke="#d4a017" stroke-width="1.6"/>
  <text x="586" y="480" fill="#f2dca0" font-size="12.5" font-weight="700" text-anchor="middle">design_commit</text>
  <text x="586" y="498" fill="#9fb0c8" font-size="10.5" text-anchor="middle">verificação + DRC nativo</text>
  <text x="586" y="512" fill="#9fb0c8" font-size="10.5" text-anchor="middle">preview/diff · reversível</text>

  <line x1="686" y1="488" x2="740" y2="488" stroke="#c87137" stroke-width="2.2" marker-end="url(#a2)"/>

  <!-- 8 KiCAD apply -->
  <rect x="740" y="456" width="200" height="64" rx="10" fill="#1a2f1f" stroke="#3f9f6b" stroke-width="1.6"/>
  <text x="840" y="482" fill="#9be7bd" font-size="13" font-weight="700" text-anchor="middle">KiCAD (IPC)</text>
  <text x="840" y="501" fill="#bfe6cf" font-size="10.5" text-anchor="middle">tracks/vias ao vivo</text>
  <text x="840" y="514" fill="#bfe6cf" font-size="10.5" text-anchor="middle">um único commit / undo</text>

  <text x="34" y="540" fill="#6f7f97" font-size="11">Testado sem Java/rede: parser de SES e aplicação ao board são puros; a execução do motor é isolada (gated).</text>
</svg>
